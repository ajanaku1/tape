<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tape">
  <rect width="128" height="128" rx="28" fill="#0a0c10"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" stroke="#5eead4" stroke-opacity="0.18"/>
  <!-- ticker baseline -->
  <line x1="24" y1="92" x2="104" y2="92" stroke="#22303a" stroke-width="3" stroke-linecap="round"/>
  <!-- rising tape-line that resolves into a check -->
  <path d="M28 78 L48 84 L62 64 L100 30" stroke="#5eead4" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the check tick -->
  <path d="M48 84 L62 64" stroke="#5eead4" stroke-width="9" stroke-linecap="round"/>
  <!-- anchor dot (on-chain) -->
  <circle cx="100" cy="30" r="8" fill="#5eead4"/>
  <circle cx="100" cy="30" r="14" stroke="#5eead4" stroke-opacity="0.3" stroke-width="3"/>
</svg>
